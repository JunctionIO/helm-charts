apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "junction.fullname" . }}-api
  labels:
    {{- include "junction.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "junction.selectorLabels" (dict "context" . "component" "api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "junction.labels" . | nindent 8 }}
        {{- include "junction.selectorLabels" (dict "context" . "component" "api") | nindent 8 }}
    spec:
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: fpm
              containerPort: {{ .Values.api.fpm.port }}
          envFrom:
            - secretRef:
                name: {{ include "junction.appSecretName" . }}
          env:
            - name: APP_ENV
              value: {{ .Values.api.env.appEnv | quote }}
            - name: APP_NAME
              value: junction-api
            - name: APP_DEBUG
              value: {{ .Values.api.env.appDebug | quote }}
            - name: APP_VERSION
              value: {{ .Values.api.image.tag | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.api.env.logLevel | quote }}
            - name: DB_DRIVER
              value: pgsql
            - name: DB_HOST
              value: {{ include "junction.dbHost" . | quote }}
            - name: DB_PORT
              value: {{ include "junction.dbPort" . | quote }}
            - name: DB_DATABASE
              value: {{ .Values.database.name | quote }}
            - name: QUEUE_HOST
              value: {{ include "junction.queueHost" . | quote }}
            - name: QUEUE_PORT
              value: {{ include "junction.queuePort" . | quote }}
          readinessProbe:
            tcpSocket:
              port: fpm
          livenessProbe:
            tcpSocket:
              port: fpm
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
        - name: nginx
          image: "{{ .Values.api.nginx.image.repository }}:{{ .Values.api.nginx.image.tag }}"
          imagePullPolicy: {{ .Values.api.nginx.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.api.nginx.port }}
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
          readinessProbe:
            tcpSocket:
              port: http
          livenessProbe:
            tcpSocket:
              port: http
          resources:
            {{- toYaml .Values.api.nginx.resources | nindent 12 }}
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "junction.fullname" . }}-nginx
