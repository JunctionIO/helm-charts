{{- if .Values.rabbitmq.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "junction.fullname" . }}-rabbitmq
  labels:
    {{- include "junction.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "junction.fullname" . }}-rabbitmq
  replicas: 1
  selector:
    matchLabels:
      {{- include "junction.selectorLabels" (dict "context" . "component" "rabbitmq") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "junction.labels" . | nindent 8 }}
        {{- include "junction.selectorLabels" (dict "context" . "component" "rabbitmq") | nindent 8 }}
    spec:
      containers:
        - name: rabbitmq
          image: "{{ .Values.rabbitmq.image.repository }}:{{ .Values.rabbitmq.image.tag }}"
          imagePullPolicy: {{ .Values.rabbitmq.image.pullPolicy }}
          ports:
            - name: amqp
              containerPort: 5672
            - name: management
              containerPort: 15672
          env:
            - name: RABBITMQ_DEFAULT_USER
              value: {{ .Values.rabbitmq.auth.username | quote }}
            - name: RABBITMQ_DEFAULT_PASS
              value: {{ .Values.rabbitmq.auth.password | quote }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/rabbitmq
          readinessProbe:
            tcpSocket:
              port: amqp
          livenessProbe:
            tcpSocket:
              port: amqp
          resources:
            {{- toYaml .Values.rabbitmq.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.rabbitmq.persistence.size }}
{{- end }}
