{{/*
Shared secret for the HTTP destination and system workers. Both hit the
same /system/* endpoints, so one issued worker token covers both.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "junction.workerSecretName" . }}
  labels:
    {{- include "junction.labels" . | nindent 4 }}
type: Opaque
stringData:
  JUNCTION_WORKER_TOKEN: {{ required "secrets.worker.token is required" .Values.secrets.worker.token | quote }}
  RABBITMQ_URL: {{ include "junction.rabbitmqUrl" . | quote }}
