{{/*
Shared secret for the API and CLI. dbPassword/queuePassword are the same
values passed to the postgresql/rabbitmq subcharts (see values.yaml YAML
anchors) so credentials always agree.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "junction.appSecretName" . }}
  labels:
    {{- include "junction.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ required "secrets.app.jwtSecret is required" .Values.secrets.app.jwtSecret | quote }}
  DB_USERNAME: {{ .Values.secrets.app.dbUsername | quote }}
  DB_PASSWORD: {{ .Values.secrets.app.dbPassword | quote }}
  QUEUE_USER: {{ .Values.secrets.app.queueUsername | quote }}
  QUEUE_PASSWORD: {{ .Values.secrets.app.queuePassword | quote }}
