# Resource requests/limits throughout this file are placeholders, not yet
# benchmarked.

api:
  replicaCount: 1

  image:
    repository: ghcr.io/junctionio/api
    tag: "0.1.1"
    pullPolicy: IfNotPresent

  env:
    appEnv: production
    appDebug: false
    logLevel: info

  fpm:
    port: 9000

  nginx:
    image:
      repository: nginx
      tag: "1.27-alpine"
      pullPolicy: IfNotPresent
    port: 8080
    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi

  service:
    type: ClusterIP
    port: 80

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

httpDestinationWorker:
  replicaCount: 1

  image:
    repository: ghcr.io/junctionio/http-destination
    tag: "0.2.0"
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 250m
      memory: 128Mi

systemWorker:
  replicaCount: 1

  image:
    repository: ghcr.io/junctionio/system-worker
    tag: "0.1.0"
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 250m
      memory: 128Mi

cli:
  image:
    repository: ghcr.io/junctionio/cli
    tag: "0.1.0"
    pullPolicy: IfNotPresent

  # Runs `migration:run --force` as a post-install/pre-upgrade Helm hook Job.
  migrate:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

  # Adhoc `token:create` Job, disabled by default. Render and apply manually:
  #   helm template junction ./charts/junction \
  #     --set cli.keygen.enabled=true \
  #     --set cli.keygen.type=system \
  #     --set cli.keygen.id=http_destination \
  #     --show-only templates/cli-keygen-job.yaml | kubectl apply -f -
  keygen:
    enabled: false
    type: relay
    id: ""
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

# Ignored (host/port derived from the bundled Postgres Service) when
# postgres.enabled is true.
database:
  host: ""
  port: 5432
  name: junction

# Ignored (host/port derived from the bundled RabbitMQ Service) when
# rabbitmq.enabled is true.
queue:
  host: ""
  port: 5672

# Templated into two Secrets: "app" (API + CLI) and "worker" (both workers).
# jwtSecret and worker.token have no default - must be set explicitly, see
# templates/secret-app.yaml and templates/secret-worker.yaml.
# dbUsername/dbPassword and queueUsername/queuePassword are shared with the
# postgres/rabbitmq sections below via YAML anchors.
secrets:
  app:
    jwtSecret: ""
    dbUsername: &dbUsername junction
    dbPassword: &dbPassword junction
    queueUsername: &queueUsername guest
    queuePassword: &queuePassword guest
  worker:
    token: ""

# Bundled single-node Postgres (official postgres image). Set enabled: false
# and populate `database` above to point at an externally-managed instance.
postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  auth:
    username: *dbUsername
    password: *dbPassword
    database: junction
  persistence:
    size: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Bundled single-node RabbitMQ (official rabbitmq image). Set enabled: false
# and populate `queue` above to point at an externally-managed instance.
rabbitmq:
  enabled: true
  image:
    repository: rabbitmq
    tag: "4-management-alpine"
    pullPolicy: IfNotPresent
  auth:
    username: *queueUsername
    password: *queuePassword
  persistence:
    size: 2Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
